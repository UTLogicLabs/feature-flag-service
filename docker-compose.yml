services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: feature_flags
      POSTGRES_PASSWORD: feature_flags
      POSTGRES_DB: feature_flags
    ports:
      - "5433:5432"
    volumes:
      - feature_flags_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feature_flags"]
      interval: 2s
      timeout: 2s
      retries: 20

  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: feature_flags
      POSTGRES_PASSWORD: feature_flags
      POSTGRES_DB: feature_flags_test
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feature_flags"]
      interval: 2s
      timeout: 2s
      retries: 20

volumes:
  feature_flags_pg_data:
